  <text x="142" y="587" text-anchor="middle" class="small">Ho so / Thi</text>

  <rect x="245" y="535" width="125" height="84" class="node"/>
  <text x="307" y="565" text-anchor="middle" class="label">Admin UI</text>
  <text x="307" y="587" text-anchor="middle" class="small">Quan tri</text>

  <rect x="470" y="315" width="230" height="95" class="network"/>

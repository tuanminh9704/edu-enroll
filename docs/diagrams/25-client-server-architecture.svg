<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="860" viewBox="0 0 1480 860" role="img" aria-labelledby="title desc">
  <title id="title">Client Server Architecture - Edu Enroll</title>
  <desc id="desc">Kien truc he thong Client Server gom React Client, Node Express API, MongoDB va cac dich vu ngoai.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 16px; fill: #475569; }
      .group { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
      .groupTitle { font-size: 18px; font-weight: 700; fill: #334155; }
      .node { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .server { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 10; }
      .data { fill: #ecfdf5; stroke: #059669; stroke-width: 2; }
      .external { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 10; }
      .network { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 10; }
      .label { font-size: 15px; font-weight: 600; }
      .small { font-size: 13px; fill: #475569; }
      .edge { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1480" height="860" fill="#ffffff"/>
  <text x="740" y="50" text-anchor="middle" class="title">2.3.1. Thiet ke kien truc he thong Client - Server</text>
  <text x="740" y="78" text-anchor="middle" class="subtitle">React Client giao tiep Node.js / Express API qua REST, API xu ly nghiep vu va ket noi MongoDB cung dich vu ngoai</text>

  <rect x="45" y="120" width="360" height="620" class="group"/>
  <text x="225" y="153" text-anchor="middle" class="groupTitle">Client Layer</text>
  <text x="225" y="175" text-anchor="middle" class="small">Trinh duyet nguoi dung</text>

  <rect x="90" y="215" width="270" height="64" class="node"/>
  <text x="225" y="241" text-anchor="middle" class="label">Web Browser</text>
  <text x="225" y="263" text-anchor="middle" class="small">Hoc vien / Phu huynh / Admin</text>

  <rect x="90" y="315" width="270" height="64" class="node"/>
  <text x="225" y="341" text-anchor="middle" class="label">React App</text>
  <text x="225" y="363" text-anchor="middle" class="small">Routing, state, UI pages</text>

  <rect x="80" y="420" width="125" height="74" class="node"/>
  <text x="142" y="448" text-anchor="middle" class="label">Public UI</text>
  <text x="142" y="470" text-anchor="middle" class="small">Banner / Tin tuc</text>

  <rect x="245" y="420" width="125" height="74" class="node"/>
  <text x="307" y="448" text-anchor="middle" class="label">Auth UI</text>
  <text x="307" y="470" text-anchor="middle" class="small">Login / Profile</text>

  <rect x="80" y="535" width="125" height="84" class="node"/>

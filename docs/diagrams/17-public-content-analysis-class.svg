<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1123" height="794" viewBox="0 0 1123 794">
  <style>
    .box { fill: #fff; stroke: #222; stroke-width: 1.6; }
    .line { stroke: #222; stroke-width: 1.4; fill: none; }
    .txt { font-family: Arial, Helvetica, sans-serif; fill: #111; font-size: 15px; }
    .title { font-family: Arial, Helvetica, sans-serif; fill: #111; font-size: 19px; font-weight: 700; }
    .small { font-family: Arial, Helvetica, sans-serif; fill: #111; font-size: 13px; }
    .stereo { font-family: Arial, Helvetica, sans-serif; fill: #111; font-size: 14px; }
  </style>

  <text x="561.5" y="34" text-anchor="middle" class="title">BIEU DO LOP PHAN TICH - USE CASE XEM NOI DUNG CONG KHAI</text>

  <!-- Boundary: XemNoiDungCongKhaiUI -->
  <rect x="48" y="82" width="315" height="168" class="box"/>
  <line x1="48" y1="142" x2="363" y2="142" class="line"/>
  <line x1="48" y1="202" x2="363" y2="202" class="line"/>
  <text x="205.5" y="108" text-anchor="middle" class="stereo">&lt;&lt;boundary&gt;&gt;</text>
  <text x="205.5" y="130" text-anchor="middle" class="title">XemNoiDungCongKhaiUI</text>
  <text x="64" y="168" class="txt">+ chonTrangChu()</text>
  <text x="64" y="190" class="txt">+ chonTinTuc(slug)</text>
  <text x="64" y="226" class="txt">+ hienThiBanner()</text>
  <text x="64" y="248" class="txt">+ hienThiTinTuc()</text>

  <!-- Control: ContentController -->
  <rect x="528" y="82" width="350" height="168" class="box"/>
  <line x1="528" y1="142" x2="878" y2="142" class="line"/>
  <line x1="528" y1="202" x2="878" y2="202" class="line"/>
  <text x="703" y="108" text-anchor="middle" class="stereo">&lt;&lt;control&gt;&gt;</text>
  <text x="703" y="130" text-anchor="middle" class="title">ContentController</text>
  <text x="544" y="168" class="txt">+ layDanhSachBanner()</text>
  <text x="544" y="190" class="txt">+ layDanhSachTinTuc(limit)</text>
  <text x="544" y="226" class="txt">+ layChiTietTinTuc(slug)</text>

  <!-- Entity: BANNERS -->
  <rect x="538" y="338" width="330" height="190" class="box"/>
  <line x1="538" y1="398" x2="868" y2="398" class="line"/>
  <line x1="538" y1="486" x2="868" y2="486" class="line"/>
  <text x="703" y="364" text-anchor="middle" class="stereo">&lt;&lt;entity&gt;&gt;</text>
  <text x="703" y="386" text-anchor="middle" class="title">BANNERS</text>
  <text x="554" y="422" class="txt">- _id</text>
  <text x="554" y="444" class="txt">- title, subtitle, image_url, link_url</text>
  <text x="554" y="466" class="txt">- position, is_active, sort_order, created_at</text>
  <text x="554" y="512" class="txt">+ findActive()</text>

  <!-- Entity: NEWS -->
  <rect x="538" y="572" width="330" height="190" class="box"/>
  <line x1="538" y1="632" x2="868" y2="632" class="line"/>
  <line x1="538" y1="720" x2="868" y2="720" class="line"/>
  <text x="703" y="598" text-anchor="middle" class="stereo">&lt;&lt;entity&gt;&gt;</text>
  <text x="703" y="620" text-anchor="middle" class="title">NEWS</text>
  <text x="554" y="656" class="txt">- _id</text>
  <text x="554" y="678" class="txt">- title, slug, summary, content</text>
  <text x="554" y="700" class="txt">- category, status, published_at, created_at</text>
  <text x="554" y="746" class="txt">+ findPublished()</text>

  <!-- Associations -->
  <line x1="363" y1="112" x2="528" y2="112" class="line"/>
  <text x="438" y="102" class="small">1</text>
  <text x="508" y="102" class="small">1</text>

  <line x1="703" y1="250" x2="703" y2="338" class="line"/>
  <text x="714" y="276" class="small">1</text>
  <text x="714" y="326" class="small">n</text>

  <line x1="703" y1="528" x2="703" y2="572" class="line"/>
  <text x="714" y="548" class="small">1</text>
  <text x="714" y="566" class="small">n</text>
</svg>

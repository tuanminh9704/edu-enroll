<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1260" viewBox="0 0 1680 1260" role="img" aria-labelledby="title desc">
  <title id="title">UI Wireframes - Edu Enroll</title>
  <desc id="desc">Mockup wireframe cac man hinh chinh cua he thong tuyen sinh Edu Enroll.</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 16px; fill: #475569; }
      .frame { fill: #ffffff; stroke: #0f172a; stroke-width: 2; rx: 14; }
      .topbar { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; rx: 8; }
      .sidebar { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .block { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.4; rx: 8; }
      .primary { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.4; rx: 8; }
      .accent { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.4; rx: 8; }
      .success { fill: #ecfdf5; stroke: #059669; stroke-width: 1.4; rx: 8; }
      .danger { fill: #fef2f2; stroke: #dc2626; stroke-width: 1.4; rx: 8; }
      .line { stroke: #94a3b8; stroke-width: 2; }
      .label { font-size: 15px; font-weight: 700; }
      .small { font-size: 12px; fill: #475569; }
      .tiny { font-size: 10px; fill: #64748b; }
    </style>
  </defs>

  <rect width="1680" height="1260" fill="#ffffff"/>
  <text x="840" y="46" text-anchor="middle" class="title">2.3.3. Thiet ke giao dien nguoi dung - Mockup / Wireframe</text>
  <text x="840" y="74" text-anchor="middle" class="subtitle">Cac man hinh chinh: public, authentication, user portal, enrollment flow va admin portal</text>

  <!-- Home -->
  <rect x="60" y="110" width="480" height="310" class="frame"/>
  <text x="300" y="138" text-anchor="middle" class="label">Trang chu cong khai (/)</text>
  <rect x="85" y="160" width="430" height="42" class="topbar"/>
  <text x="110" y="186" class="small">Logo</text>
  <text x="405" y="186" class="small">Dang nhap | Dang ky</text>
  <rect x="85" y="220" width="430" height="92" class="primary"/>
  <text x="300" y="260" text-anchor="middle" class="label">Banner tuyen sinh</text>
  <text x="300" y="282" text-anchor="middle" class="small">CTA: Dang ky tuyen sinh</text>
  <rect x="85" y="330" width="130" height="60" class="block"/>
  <rect x="235" y="330" width="130" height="60" class="block"/>

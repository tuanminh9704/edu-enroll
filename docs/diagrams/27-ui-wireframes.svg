  <text x="440" y="508" text-anchor="middle" class="label">Ho so tuyen sinh (/ho-so)</text>
  <rect x="90" y="535" width="700" height="44" class="topbar"/>
  <text x="440" y="562" text-anchor="middle" class="small">Stepper: Chinh sach -> Thanh toan -> Thong tin -> Thi -> Chuong trinh -> Ho so goc</text>
  <rect x="90" y="605" width="210" height="165" class="block"/>

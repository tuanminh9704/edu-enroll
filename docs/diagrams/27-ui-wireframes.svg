  <text x="445" y="665" text-anchor="middle" class="small">Da ky / Da thanh toan</text>
  <text x="445" y="690" text-anchor="middle" class="small">Ket qua thi</text>
  <text x="445" y="715" text-anchor="middle" class="small">Chuong trinh da chon</text>
  <rect x="590" y="605" width="200" height="165" class="success"/>
  <text x="690" y="635" text-anchor="middle" class="label">Hanh dong</text>
  <rect x="625" y="670" width="130" height="34" class="primary"/>
  <text x="690" y="692" text-anchor="middle" class="small">Tiep tuc</text>
  <rect x="625" y="720" width="130" height="34" class="block"/>
  <text x="690" y="742" text-anchor="middle" class="small">Luu nhap</text>

  <!-- Admin dashboard -->
  <rect x="860" y="480" width="760" height="350" class="frame"/>
  <text x="1240" y="508" text-anchor="middle" class="label">Dashboard quan tri (/quan-tri)</text>
  <rect x="890" y="535" width="130" height="255" class="sidebar"/>
  <text x="955" y="565" text-anchor="middle" class="small">Admin menu</text>
  <text x="955" y="595" text-anchor="middle" class="tiny">Dashboard</text>
  <text x="955" y="620" text-anchor="middle" class="tiny">Nguoi dung</text>
  <text x="955" y="645" text-anchor="middle" class="tiny">Ho so</text>
  <text x="955" y="670" text-anchor="middle" class="tiny">Ky thi / Diem</text>
  <text x="955" y="695" text-anchor="middle" class="tiny">Noi dung</text>
  <rect x="1050" y="535" width="125" height="78" class="primary"/>
  <rect x="1195" y="535" width="125" height="78" class="primary"/>
  <rect x="1340" y="535" width="125" height="78" class="primary"/>
  <rect x="1485" y="535" width="105" height="78" class="primary"/>
  <text x="1112" y="580" text-anchor="middle" class="small">Users</text>
  <text x="1257" y="580" text-anchor="middle" class="small">Ho so</text>
  <text x="1402" y="580" text-anchor="middle" class="small">Doanh thu</text>
  <text x="1537" y="580" text-anchor="middle" class="small">Cho xu ly</text>
  <rect x="1050" y="645" width="540" height="145" class="block"/>
  <text x="1320" y="675" text-anchor="middle" class="label">Bang thong ke / bieu do</text>
  <line x1="1085" y1="710" x2="1555" y2="710" class="line"/>
  <line x1="1085" y1="745" x2="1555" y2="745" class="line"/>

  <!-- Admin list -->
  <rect x="270" y="890" width="1140" height="290" class="frame"/>
  <text x="840" y="918" text-anchor="middle" class="label">Man hinh quan ly danh sach cua admin</text>
  <rect x="300" y="945" width="1080" height="42" class="topbar"/>
  <text x="330" y="971" class="small">Tieu de module</text>
  <rect x="1160" y="954" width="95" height="24" class="primary"/>
  <text x="1207" y="971" text-anchor="middle" class="tiny">Them moi</text>
  <rect x="1270" y="954" width="85" height="24" class="accent"/>
  <text x="1312" y="971" text-anchor="middle" class="tiny">Export</text>
  <rect x="300" y="1010" width="1080" height="50" class="block"/>
  <text x="355" y="1040" class="small">Bo loc / Tim kiem / Trang thai / Ngay</text>
  <rect x="300" y="1080" width="1080" height="70" class="block"/>
  <text x="355" y="1110" class="small">Bang du lieu: cot thong tin, trang thai, ngay tao, hanh dong</text>
  <line x1="320" y1="1128" x2="1360" y2="1128" class="line"/>
  <text x="840" y="1168" text-anchor="middle" class="tiny">Ap dung cho: Nguoi dung, Ho so, Ky thi, Diem thi, Phuc khao, Phong van, Hoa don, Chuong trinh, Noi dung</text>
</svg>

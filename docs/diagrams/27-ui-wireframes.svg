  <text x="1380" y="138" text-anchor="middle" class="label">Tai khoan va thong bao</text>
  <rect x="1165" y="160" width="100" height="230" class="sidebar"/>
  <text x="1215" y="190" text-anchor="middle" class="small">Menu</text>

  <line x1="655" y1="225" x2="785" y2="225" class="line"/>
  <line x1="655" y1="260" x2="785" y2="260" class="line"/>
  <rect x="655" y="292" width="130" height="34" class="primary"/>
  <text x="720" y="314" text-anchor="middle" class="small">Dang nhap</text>
  <text x="720" y="352" text-anchor="middle" class="tiny">Quen mat khau</text>
  <rect x="845" y="160" width="210" height="220" class="block"/>

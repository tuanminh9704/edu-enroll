  <rect x="1290" y="255" width="140" height="110" class="block"/>
  <text x="1360" y="292" text-anchor="middle" class="small">Doi mat khau</text>
  <rect x="1455" y="255" width="140" height="110" class="success"/>
  <text x="1525" y="292" text-anchor="middle" class="small">Thong bao</text>
  <text x="1525" y="315" text-anchor="middle" class="tiny">Unread count</text>


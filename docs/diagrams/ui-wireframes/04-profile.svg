  <text x="130" y="250" class="small" text-anchor="start">Ho so tuyen sinh</text>
  <text x="130" y="285" class="small" text-anchor="start">Thong bao</text>

  <rect x="310" y="135" width="550" height="180" class="box"/>
  <text x="335" y="175" class="label" text-anchor="start">Thong tin ca nhan</text>
  <text x="335" y="212" class="tiny" text-anchor="start">Ho ten</text>
<rect x="335" y="220" width="220" height="34" class="box"/>
  <text x="595" y="212" class="tiny" text-anchor="start">So dien thoai</text>
<rect x="595" y="220" width="220" height="34" class="box"/>
  <rect x="335" y="275" width="160" height="34" class="button"/>
<text x="415" y="297" class="smallBold" text-anchor="middle">Luu thay doi</text>

  <rect x="310" y="350" width="550" height="205" class="box"/>

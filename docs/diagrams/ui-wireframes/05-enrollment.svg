<svg xmlns="http://www.w3.org/2000/svg" width="960" height="680" viewBox="0 0 960 680" role="img">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #000; }
      .page { fill: #fff; stroke: #000; stroke-width: 2; }
      .chrome { fill: #fff; stroke: #000; stroke-width: 2; }
      .box { fill: #fff; stroke: #000; stroke-width: 1.6; rx: 4; }
      .button { fill: #fff; stroke: #000; stroke-width: 2; rx: 4; }
      .line { stroke: #000; stroke-width: 1.5; }
      .dash { stroke: #000; stroke-width: 1.4; stroke-dasharray: 6 5; fill: none; }
      .title { font-size: 22px; font-weight: 700; }
      .label { font-size: 16px; font-weight: 700; }
      .smallBold { font-size: 13px; font-weight: 700; }
      .small { font-size: 13px; }
      .tiny { font-size: 11px; }
    </style>
  </defs>
  <rect width="960" height="680" fill="#fff"/>
  <text x="480" y="38" class="title" text-anchor="middle">Wireframe 05 - Ho so tuyen sinh</text>
  <rect x="70" y="70" width="820" height="560" class="page"/>
  <rect x="70" y="70" width="820" height="42" class="chrome"/>
  <circle cx="94" cy="91" r="5" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="114" cy="91" r="5" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <circle cx="134" cy="91" r="5" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="170" y="82" width="470" height="18" class="box"/>
  
  <rect x="100" y="135" width="760" height="55" class="box"/>
  <text x="480" y="168" class="small" text-anchor="middle">Stepper: Chinh sach &gt; Thanh toan &gt; Thong tin &gt; Thi &gt; Chuong trinh &gt; Ho so goc</text>

  <rect x="100" y="225" width="470" height="330" class="box"/>
  <text x="125" y="265" class="label" text-anchor="start">Noi dung buoc hien tai</text>
  <text x="125" y="307" class="tiny" text-anchor="start">Truong thong tin 1</text>
<rect x="125" y="315" width="380" height="34" class="box"/>
  <text x="125" y="372" class="tiny" text-anchor="start">Truong thong tin 2</text>
<rect x="125" y="380" width="380" height="34" class="box"/>
  <text x="125" y="437" class="tiny" text-anchor="start">Truong thong tin 3</text>
<rect x="125" y="445" width="380" height="34" class="box"/>
  <rect x="125" y="505" width="130" height="34" class="button"/>
<text x="190" y="527" class="smallBold" text-anchor="middle">Luu</text>
  <rect x="275" y="505" width="130" height="34" class="button"/>
<text x="340" y="527" class="smallBold" text-anchor="middle">Tiep tuc</text>

  <rect x="610" y="225" width="250" height="330" class="box"/>
  <text x="735" y="265" class="label" text-anchor="middle">Trang thai ho so</text>
  <line x1="635" y1="310" x2="835" y2="310" class="line"/>
  <line x1="635" y1="350" x2="835" y2="350" class="line"/>
  <line x1="635" y1="390" x2="835" y2="390" class="line"/>
  <line x1="635" y1="430" x2="835" y2="430" class="line"/>
  <text x="735" y="500" class="small" text-anchor="middle">Thong bao loi / thanh cong</text>

</svg>

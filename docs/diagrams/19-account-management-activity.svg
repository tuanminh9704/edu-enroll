<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1820" viewBox="0 0 1280 1820" role="img" aria-labelledby="title desc">
  <title id="title">Activity Diagram - Quan ly tai khoan</title>
  <desc id="desc">Bieu do hoat dong cho use case quan ly tai khoan, gom xem thong tin, cap nhat ho so va doi mat khau.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 16px; fill: #475569; }
      .node { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .decision { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
      .error { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; rx: 10; }
      .terminal { fill: #111827; stroke: #111827; stroke-width: 2; }
      .terminalText { fill: #ffffff; font-size: 15px; font-weight: 700; }
      .label { font-size: 15px; font-weight: 600; }
      .small { font-size: 13px; fill: #475569; }
      .edge { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .edgeNoArrow { stroke: #334155; stroke-width: 2; fill: none; }
      .branchText { font-size: 13px; fill: #334155; font-weight: 700; }
      .lane { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .laneTitle { font-size: 18px; font-weight: 700; fill: #334155; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="1820" fill="#ffffff"/>
  <text x="640" y="52" text-anchor="middle" class="title">Activity Diagram - UC03 Quan ly tai khoan</text>
  <text x="640" y="80" text-anchor="middle" class="subtitle">Xem thong tin tai khoan, cap nhat ho so ca nhan va doi mat khau</text>

  <rect x="60" y="120" width="360" height="1600" class="lane"/>
  <rect x="460" y="120" width="360" height="1600" class="lane"/>
  <rect x="860" y="120" width="360" height="1600" class="lane"/>
  <text x="240" y="152" text-anchor="middle" class="laneTitle">Nguoi dung</text>
  <text x="640" y="152" text-anchor="middle" class="laneTitle">Frontend</text>
